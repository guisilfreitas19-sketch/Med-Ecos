<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [sellers, setSellers] = useState([
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0 }
            ]);

            const handleIncrement = (id, field, amount) => {
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: Math.max(0, s[field] + amount) } : s
                ));
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);

            return (
                <div className="max-w-4xl mx-auto p-6 space-y-10">
                    <header className="flex justify-between items-center bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase tracking-tighter">Ranking <span className="text-emerald-500">Comercial</span></h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Painel de Performance</p>
                        </div>
                    </header>

                    <div className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 h-80 flex items-end justify-center gap-4">
                        {topSales.map((s, i) => (
                            <div key={s.id} className="flex flex-col items-center">
                                <span className="text-[10px] font-bold mb-2">{s.name}</span>
                                <div className={`w-24 bg-slate-800 rounded-t-xl flex items-center justify-center border-t-2 border-slate-600 ${i === 0 ? 'h-48 bg-emerald-500 border-emerald-300' : 'h-32'}`}>
                                    <span className="text-xl font-bold">{i + 1}º</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-xl space-y-4">
                        <h2 className="font-bold text-xl mb-6">📝 Gestão de Equipa</h2>
                        {sellers.map(s => (
                            <div key={s.id} className="flex flex-col md:flex-row items-center gap-4 bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                <span className="font-bold min-w-[120px] text-emerald-400">{s.name}</span>
                                <div className="flex flex-1 gap-2 w-full">
                                    <div className="flex-1 bg-slate-900 rounded-lg p-2 flex justify-between items-center border border-slate-800">
                                        <button onClick={() => handleIncrement(s.id, 'sales', -100)} className="px-3 py-1 bg-red-900/20 text-red-500 rounded">-</button>
                                        <span className="text-xs font-mono font-bold">Vendas: {s.sales}</span>
                                        <button onClick={() => handleIncrement(s.id, 'sales', 100)} className="px-3 py-1 bg-emerald-900/20 text-emerald-500 rounded">+</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
