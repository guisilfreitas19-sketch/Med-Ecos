<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto space-y-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">📈 Comparativo Geral</h1>

        <div class="card border-l-4 border-green-500">
            <p class="text-sm text-gray-500 uppercase font-bold">📅 Março/2025</p>
            <h2 class="text-xl font-semibold text-green-600">+ R$ 1.585,08 acima ✅</h2>
        </div>

        <div class="card border-l-4 border-blue-500">
            <p class="text-sm text-gray-500 uppercase font-bold">📉 Pior mês 2026</p>
            <h2 class="text-xl font-semibold text-green-600">+ R$ 601,26 acima ✅</h2>
        </div>

        <div class="card bg-gray-800 text-white">
            <p class="text-sm text-gray-400 uppercase font-bold">🏆 Melhor mês 2026 (R$ 9.741,96)</p>
            <div class="mt-2">
                <h2 class="text-2xl font-bold text-yellow-400 italic">Faltam: R$ 837,67</h2>
                <div class="w-full bg-gray-600 rounded-full h-2.5 mt-3">
                    <div class="bg-yellow-400 h-2.5 rounded-full" style="width: 91%"></div>
                </div>
            </div>
        </div>

        <button onclick="window.location.reload()" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow-lg active:scale-95 transition">
            Atualizar Dados
        </button>
    </div>

</body>
</html>
