<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Tela Única</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; } /* Trava o scroll */
        .glass-card { background: rgba(255, 255, 255, 0.98); height: 95vh; }
        .input-focus { transition: all 0.2s ease; }
        .input-focus:focus { background: #f8fafc; border-color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-900 p-2 italic text-slate-800">

    <div class="max-w-full mx-auto grid grid-cols-2 gap-4">
        
        <div class="glass-card rounded-3xl p-4 shadow-2xl border-b-4 border-emerald-500 flex flex-col">
            <h2 class="text-xl font-black text-emerald-700 mb-3 flex items-center gap-2">
                <span class="bg-emerald-100 p-1.5 rounded-lg text-sm">🌱</span> ECOS
            </h2>
            
            <div class="space-y-3 flex-grow">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Faturamento Atual</label>
                    <input type="text" id="ecos-atual" oninput="mascara(this, 'ecos', 'atual')" class="input-focus w-full bg-white border-2 border-emerald-100 p-2 rounded-xl text-2xl font-black text-emerald-600 outline-none text-center" placeholder="R$ 0,00">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Março 2025</label>
                        <input type="text" id="ecos-ref2025" oninput="mascara(this, 'ecos', 'ref2025')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Pior 2026</label>
                        <input type="text" id="ecos-pior2026" oninput="mascara(this, 'ecos', 'pior2026')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Recorde</label>
                        <input type="text" id="ecos-melhor2026" oninput="mascara(this, 'ecos', 'melhor2026')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                </div>

                <div id="res-ecos" class="space-y-2"></div>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-4 shadow-2xl border-b-4 border-indigo-500 flex flex-col">
            <h2 class="text-xl font-black text-indigo-700 mb-3 flex items-center gap-2">
                <span class="bg-indigo-100 p-1.5 rounded-lg text-sm">🏥</span> MEDSYSTEM
            </h2>
            
            <div class="space-y-3 flex-grow">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Faturamento Atual</label>
                    <input type="text" id="med-atual" oninput="mascara(this, 'med', 'atual')" class="input-focus w-full bg-white border-2 border-indigo-100 p-2 rounded-xl text-2xl font-black text-indigo-600 outline-none text-center" placeholder="R$ 0,00">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Março 2025</label>
                        <input type="text" id="med-ref2025" oninput="mascara(this, 'med', 'ref2025')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Pior 2026</label>
                        <input type="text" id="med-pior2026" oninput="mascara(this, 'med', 'pior2026')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-white p-2 rounded-xl border border-slate-200">
                        <label class="text-[8px] font-bold text-slate-400 uppercase block text-center">Recorde</label>
                        <input type="text" id="med-melhor2026" oninput="mascara(this, 'med', 'melhor2026')" class="w-full text-center font-bold text-xs outline-none" placeholder="R$ 0,00">
                    </div>
                </div>

                <div id="res-med" class="space-y-2"></div>
            </div>
        </div>

    </div>

    <script>
        const storeKey = 'dash_final_tv';
        let dados = JSON.parse(localStorage.getItem(storeKey)) || {
            med: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 },
            ecos: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 }
        };

        function formatar(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function mascara(i, emp, campo) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = v !== '0,00' ? 'R$ ' + v : '';
            dados[emp][campo] = parseFloat(v.replace(/\./g, '').replace(',', '.')) || 0;
            localStorage.setItem(storeKey, JSON.stringify(dados));
            calcular(emp);
        }

        function criarCard(titulo, base, atual, icone) {
            if (!base || !atual) return '';
            const diff = atual - base;
            const perc = (atual / base) * 100;
            const isPos = diff >= 0;
            
            return `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-sm">${icone}</span>
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase leading-none">${titulo}</p>
                            <p class="text-[10px] font-bold text-slate-500">${formatar(base)}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black ${isPos ? 'text-green-500' : 'text-rose-500'} leading-none">
                            ${isPos ? '▲' : '▼'} ${formatar(Math.abs(diff))}
                        </p>
                        <p class="text-[9px] font-black text-slate-400 mt-1 uppercase">${perc.toFixed(1)}%</p>
                    </div>
                </div>
            `;
        }

        function calcular(emp) {
            const d = dados[emp];
            let html = "";
            html += criarCard("Março/25", d.ref2025, d.atual, "📅");
            html += criarCard("Vs. Pior 26", d.pior2026, d.atual, "📉");
            html += criarCard("Vs. Recorde", d.melhor2026, d.atual, "🏆");
            document.getElementById(`res-${emp}`).innerHTML = html;
        }

        window.onload = () => {
            ['med', 'ecos'].forEach(emp => {
                ['atual', 'ref2025', 'pior2026', 'melhor2026'].forEach(f => {
                    if(dados[emp][f] > 0) document.getElementById(`${emp}-${f}`).value = formatar(dados[emp][f]);
                });
                calcular(emp);
            });
        };
    </script>
</body>
</html>
