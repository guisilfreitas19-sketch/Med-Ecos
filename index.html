<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .meta-hit { border-color: #fbbf24 !important; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { border-color: #27272a; } 50% { border-color: #fbbf24; } 100% { border-color: #27272a; } }
        .bar-anim { transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="text-slate-100 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icons = {
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            Trending: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

        function App() {
            const [sellers, setSellers] = useState(JSON.parse(localStorage.getItem('soitic_v5')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ]);

            useEffect(() => localStorage.setItem('soitic_v5', JSON.stringify(sellers)), [sellers]);

            const totals = useMemo(() => ({
                sales: sellers.reduce((acc, s) => acc + s.sales, 0),
                contracts: sellers.reduce((acc, s) => acc + s.contracts, 0)
            }), [sellers]);

            const sortedSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);

            const handleUpdate = (id, field, value) => {
                const val = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => {
                    if (s.id === id) {
                        if (field === 'sales' && val >= s.target && s.sales < s.target) {
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#10b981', '#ffffff'] });
                        }
                        return { ...s, [field]: val };
                    }
                    return s;
                }));
            };

            return (
                <div className="max-w-6xl mx-auto px-6 py-10">
                    {/* Header Refinado */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                        <div className="flex items-center gap-5">
                            <div className="w-14 h-14 rounded-2xl bg-amber-500 flex items-center justify-center shadow-[0_8px_30px_rgb(245,158,11,0.3)] text-black">
                                <Icons.Trophy />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase italic leading-none">Grupo <span className="text-amber-500">Soitic</span></h1>
                                <p className="text-[10px] text-slate-500 font-black uppercase tracking-[0.5em] mt-1">Sales Performance Dashboard</p>
                            </div>
                        </div>
                        
                        <div className="flex gap-4">
                            <div className="bg-card px-6 py-3 rounded-2xl flex flex-col items-center border-emerald-500/20">
                                <span className="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Total Geral</span>
                                <span className="text-xl font-mono font-bold text-white">{formatCurrency(totals.sales)}</span>
                            </div>
                            <div className="bg-card px-6 py-3 rounded-2xl flex flex-col items-center border-blue-500/20">
                                <span className="text-[9px] font-black text-blue-500 uppercase tracking-widest">Contratos</span>
                                <span className="text-xl font-mono font-bold text-white">{totals.contracts}</span>
                            </div>
                        </div>
                    </div>

                    {/* Grid de Gestão */}
                    <div className="grid lg:grid-cols-12 gap-8">
                        {/* Lista Principal (Col 8) */}
                        <div className="lg:col-span-8 space-y-4">
                            <div className="flex items-center justify-between px-2 mb-4">
                                <h2 className="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                    <Icons.Users /> Performance Individual
                                </h2>
                            </div>
                            
                            {sellers.map((s, idx) => {
                                const progress = Math.min((s.sales / s.target) * 100, 100);
                                const isGoal = progress >= 100;
                                const isLeader = s.id === sortedSales[0].id && s.sales > 0;

                                return (
                                    <div key={s.id} className={`bg-card p-6 rounded-[2rem] transition-all hover:translate-x-1 ${isGoal ? 'meta-hit' : ''}`}>
                                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                            <div className="flex items-center gap-4 w-full md:w-auto">
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg ${isLeader ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-400'}`}>
                                                    {isLeader ? '★' : idx + 1}
                                                </div>
                                                <div>
                                                    <h3 className="font-black text-xl uppercase tracking-tighter">{s.name}</h3>
                                                    {isGoal && <span className="text-[9px] font-black text-amber-500 uppercase tracking-widest animate-pulse">● Elite Member</span>}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 w-full md:w-80">
                                                <div className="relative">
                                                    <label className="absolute -top-2 left-3 bg-[#18181b] px-2 text-[8px] font-black text-emerald-500 uppercase tracking-tighter">Vendas</label>
                                                    <input type="number" value={s.sales} onChange={e => handleUpdate(s.id, 'sales', e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-3 pt-4 text-sm font-mono text-emerald-400 focus:border-emerald-500/50 outline-none" />
                                                </div>
                                                <div className="relative">
                                                    <label className="absolute -top-2 left-3 bg-[#18181b] px-2 text-[8px] font-black text-blue-500 uppercase tracking-tighter">Contratos</label>
                                                    <input type="number" value={s.contracts} onChange={e => handleUpdate(s.id, 'contracts', e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-3 pt-4 text-sm font-mono text-blue-400 focus:border-blue-500/50 outline-none" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-6">
                                            <div className="flex justify-between items-end mb-2 px-1">
                                                <span className="text-[10px] font-bold text-slate-500 uppercase">Progresso da Meta ({formatCurrency(s.target)})</span>
                                                <span className={`text-xs font-black ${isGoal ? 'text-amber-500' : 'text-emerald-500'}`}>{Math.round(progress)}%</span>
                                            </div>
                                            <div className="h-2.5 w-full bg-black rounded-full overflow-hidden border border-white/5">
                                                <div className={`h-full bar-anim rounded-full ${isGoal ? 'bg-gradient-to-r from-amber-500 to-yellow-300' : 'bg-gradient-to-r from-emerald-600 to-emerald-400'}`} style={{ width: `${progress}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Ranking Lateral (Col 4) */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] border border-white/5 sticky top-32">
                                <h3 className="text-sm font-black uppercase tracking-[0.2em] mb-8 text-amber-500 flex items-center gap-2">
                                    <Icons.Trending /> Leaderboard
                                </h3>
                                <div className="space-y-6">
                                    {sortedSales.map((s, i) => (
                                        <div key={s.id} className="flex items-center justify-between group">
                                            <div className="flex items-center gap-4">
                                                <span className={`text-xl font-black italic ${i === 0 ? 'text-amber-500' : 'text-slate-700'}`}>0{i+1}</span>
                                                <span className="font-bold text-sm uppercase group-hover:text-amber-500 transition-colors">{s.name}</span>
                                            </div>
                                            <span className="text-xs font-mono font-bold text-slate-400">{formatCurrency(s.sales)}</span>
                                        </div>
                                    ))}
                                </div>

                                <button 
                                    onClick={() => confirm("Resetar todos os dados?") && setSellers(sellers.map(s => ({...s, sales: 0, contracts: 0})))}
                                    className="w-full mt-10 py-4 rounded-2xl border border-red-900/20 text-red-900 text-[10px] font-black uppercase tracking-widest hover:bg-red-900 hover:text-white transition-all"
                                >
                                    Zerar Ciclo
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
