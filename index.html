<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Metas & Recordes V1.2 | SOITIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .glass-card { background: #ffffff; height: 82vh; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .bg-main { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .title-glow { text-shadow: 0 0 20px rgba(52, 211, 153, 0.3); }
        .version-badge { background: linear-gradient(90deg, #10b981, #3b82f6); }
        /* Estilo para os cards de resultado ficarem mais limpos */
        .res-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-main p-4 italic text-slate-800">

    <div class="text-center pb-4 pt-1 relative">
        <h1 class="text-4xl font-[900] text-white tracking-[0.2em] uppercase italic title-glow">
            MONITOR DE <span class="text-emerald-400">METAS & RECORDES</span>
        </h1>
        <div class="flex justify-center items-center gap-3 mt-2">
            <div class="h-[1px] w-12 bg-white/10"></div>
            <span class="version-badge text-white text-[11px] px-3 py-0.5 rounded-full font-black tracking-widest uppercase shadow-lg">
                Sincronizado V1.2
            </span>
            <div class="h-[1px] w-12 bg-white/10"></div>
        </div>
    </div>

    <div class="max-w-full mx-auto grid grid-cols-2 gap-6">
        
        <div class="glass-card rounded-[3rem] p-6 flex flex-col border-b-[12px] border-emerald-500">
            <h2 class="text-3xl font-[900] text-emerald-600 mb-4 tracking-tighter text-center uppercase">Ecos</h2>
            <div class="space-y-4 flex-grow">
                <div class="bg-emerald-50/50 p-4 rounded-3xl border-2 border-emerald-100 shadow-inner">
                    <label class="text-[10px] font-black text-emerald-400 uppercase tracking-[0.2em] block mb-1 text-center font-sans italic">Faturamento Atual</label>
                    <input type="text" id="ecos-atual" oninput="mascara(this, 'ecos', 'atual')" class="w-full bg-transparent p-1 rounded-xl text-5xl font-[900] text-emerald-700 outline-none text-center" placeholder="R$ 0,00">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Mês Ref. 2025</label>
                        <input type="text" id="ecos-ref2025" oninput="mascara(this, 'ecos', 'ref2025')" class="w-full text-center font-black text-xs bg-transparent outline-none text-slate-600" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center text-rose-600">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Pior Mês 2026</label>
                        <input type="text" id="ecos-pior2026" oninput="mascara(this, 'ecos', 'pior2026')" class="w-full text-center font-black text-xs bg-transparent outline-none text-rose-500" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center text-emerald-600">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Melhor Mês 2026</label>
                        <input type="text" id="ecos-melhor2026" oninput="mascara(this, 'ecos', 'melhor2026')" class="w-full text-center font-black text-xs bg-transparent outline-none text-emerald-500" placeholder="R$ 0,00">
                    </div>
                </div>
                <div id="res-ecos" class="space-y-3 pt-2"></div>
            </div>
        </div>

        <div class="glass-card rounded-[3rem] p-6 flex flex-col border-b-[12px] border-indigo-500">
            <h2 class="text-3xl font-[900] text-indigo-600 mb-4 tracking-tighter text-center uppercase">Medsystem</h2>
            <div class="space-y-4 flex-grow">
                <div class="bg-indigo-50/50 p-4 rounded-3xl border-2 border-indigo-100 shadow-inner">
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] block mb-1 text-center font-sans italic">Faturamento Atual</label>
                    <input type="text" id="med-atual" oninput="mascara(this, 'med', 'atual')" class="w-full bg-transparent p-1 rounded-xl text-5xl font-[900] text-indigo-700 outline-none text-center" placeholder="R$ 0,00">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Mês Ref. 2025</label>
                        <input type="text" id="med-ref2025" oninput="mascara(this, 'med', 'ref2025')" class="w-full text-center font-black text-xs bg-transparent outline-none text-slate-600" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center text-rose-600">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Pior Mês 2026</label>
                        <input type="text" id="med-pior2026" oninput="mascara(this, 'med', 'pior2026')" class="w-full text-center font-black text-xs bg-transparent outline-none text-rose-500" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100 text-center text-emerald-600">
                        <label class="text-[8px] font-extrabold text-slate-400 uppercase block mb-1">Melhor Mês 2026</label>
                        <input type="text" id="med-melhor2026" oninput="mascara(this, 'med', 'melhor2026')" class="w-full text-center font-black text-xs bg-transparent outline-none text-emerald-500" placeholder="R$ 0,00">
                    </div>
                </div>
                <div id="res-med" class="space-y-3 pt-2"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAbIBmJwJDWslFiJ9TazuLVHXM4yZTBDSs",
            authDomain: "dashboard-financeiro-cec1f.firebaseapp.com",
            databaseURL: "https://dashboard-financeiro-cec1f-default-rtdb.firebaseio.com",
            projectId: "dashboard-financeiro-cec1f",
            storageBucket: "dashboard-financeiro-cec1f.firebasestorage.app",
            messagingSenderId: "642067118768",
            appId: "1:642067118768:web:26307698c71a113099d975"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let dados = { med: {}, ecos: {} };

        db.ref('dashboard_data').on('value', (snap) => {
            const v = snap.val(); if(v) { dados = v; atualizar(); }
        });

        function formatar(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function mascara(i, emp, campo) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            const num = parseFloat(v);
            db.ref(`dashboard_data/${emp}/${campo}`).set(num);
        }

        function atualizar() {
            ['med', 'ecos'].forEach(emp => {
                ['atual', 'ref2025', 'pior2026', 'melhor2026'].forEach(f => {
                    const el = document.getElementById(`${emp}-${f}`);
                    if (el && document.activeElement !== el) {
                        const val = dados[emp][f] || 0;
                        el.value = val > 0 ? formatar(val) : '';
                    }
                });
                calcular(emp);
            });
        }

        function criarCard(titulo, base, atual, icone) {
            if (!base || !atual) return '';
            const diff = atual - base;
            const isPos = diff >= 0;
            const porc = Math.min((atual/base)*100, 100);
            const corStatus = isPos ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200';
            const corTexto = isPos ? 'text-emerald-600' : 'text-rose-600';
            
            return `
                <div class="res-card p-4 rounded-[2rem] border-2 ${corStatus} shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-center mb-1 relative z-10">
                        <span class="text-[10px] font-[800] text-slate-400 uppercase tracking-widest">${icone} ${titulo}</span>
                        <span class="text-sm font-black ${corTexto}">${((atual/base)*100).toFixed(1)}%</span>
                    </div>
                    <div class="flex justify-between items-end relative z-10">
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase leading-none">Meta: ${formatar(base)}</p>
                            <p class="text-3xl font-[900] ${corTexto} tracking-tighter mt-1">${formatar(Math.abs(diff))}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase">${isPos ? 'SUPEROU' : 'FALTAM'}</p>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-white/50 w-full">
                        <div class="h-full ${isPos ? 'bg-emerald-500' : 'bg-rose-500'}" style="width: ${porc}%"></div>
                    </div>
                </div>
            `;
        }

        function calcular(emp) {
            const d = dados[emp];
            let html = "";
            html += criarCard("Comparativo 2025", d.ref2025, d.atual, "📈");
            html += criarCard("Recorde Negativo 2026", d.pior2026, d.atual, "📉");
            html += criarCard("Meta Recorde 2026", d.melhor2026, d.atual, "🏆");
            document.getElementById(`res-${emp}`).innerHTML = html;
        }
    </script>
</body>
</html>
