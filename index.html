<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-background { background-color: #09090b; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-background text-slate-100 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const TrophyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );

        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            }).format(value);
        };

        function App() {
            const initialState = JSON.parse(localStorage.getItem('soitic_v4')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ];

            const [sellers, setSellers] = useState(initialState);

            useEffect(() => {
                localStorage.setItem('soitic_v4', JSON.stringify(sellers));
            }, [sellers]);

            const handleUpdate = (id, field, value) => {
                const val = parseFloat(value) || 0;
                
                setSellers(prev => prev.map(s => {
                    if (s.id === id) {
                        if (field === 'sales' && val >= s.target && s.sales < s.target) {
                            confetti({
                                particleCount: 150,
                                spread: 70,
                                origin: { y: 0.6 },
                                colors: ['#fbbf24', '#10b981', '#ffffff']
                            });
                        }
                        return { ...s, [field]: val };
                    }
                    return s;
                }));
            };

            const resetAll = () => {
                if(confirm("Zerar todos os dados do Grupo Soitic?")) {
                    setSellers(sellers.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const sortedSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const sortedContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, accentColor }) => (
                <div className="bg-card rounded-2xl p-6 shadow-xl flex flex-col">
                    <div className="flex items-center gap-2 mb-8">
                        <div className={`p-2 rounded-xl ${accentColor} bg-opacity-20`}>
                            <TrophyIcon />
                        </div>
                        <h3 className="font-bold text-sm uppercase tracking-widest text-slate-400">{title}</h3>
                    </div>
                    
                    <div className="flex items-end justify-center gap-3 h-36 mt-auto">
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[10px] font-bold text-slate-500 mb-1 truncate w-full text-center">{data[1].name}</span>
                            <div className="w-full bg-[#27272a] h-16 rounded-t-xl flex items-center justify-center border-t border-white/5">
                                <span className="text-[9px] font-mono font-bold">{formatCurrency(data[1][field])}</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[11px] font-black text-white mb-1 truncate w-full text-center uppercase tracking-tighter">{data[0].name}</span>
                            <div className={`w-full ${accentColor} h-28 rounded-t-xl flex flex-col items-center justify-center shadow-2xl border-t border-white/30`}>
                                <span className="text-3xl font-black italic">1º</span>
                                <span className="text-[9px] font-bold px-1">{formatCurrency(data[0][field])}</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[10px] font-bold text-slate-600 mb-1 truncate w-full text-center">{data[2].name}</span>
                            <div className="w-full bg-[#27272a]/40 h-10 rounded-t-xl flex items-center justify-center border-t border-white/5">
                                <span className="text-[8px] font-bold opacity-40">{formatCurrency(data[2][field])}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="border-b border-[#27272a] bg-[#09090b] sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center shadow-lg text-white">
                                    <TrophyIcon />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tighter text-white uppercase italic">Grupo <span className="text-amber-500 tracking-normal">Soitic</span></h1>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em]">Ranking Comercial</p>
                                </div>
                            </div>
                            <button onClick={resetAll} className="text-[10px] font-bold border border-red-900/50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition-all uppercase">
                                Zerar Dados
                            </button>
                        </div>
                    </header>

                    <div className="max-w-5xl mx-auto px-6 py-10 space-y-10">
                        <div className="grid md:grid-cols-2 gap-8">
                            <Podium title="Contratos Aceitos" data={sortedContracts} field="contracts" accentColor="bg-blue-600" />
                            <Podium title="Total em Vendas" data={sortedSales} field="sales" accentColor="bg-emerald-600" />
                        </div>

                        <div className="bg-card rounded-[2rem] border border-[#27272a] overflow-hidden shadow-2xl">
                            <div className="p-8 border-b border-[#27272a] bg-white/[0.02]">
                                <h3 className="font-bold text-sm uppercase tracking-widest text-slate-400">Gestão de Performance</h3>
                            </div>
                            <div className="p-8 space-y-6">
                                {sellers.map(s => {
                                    const progress = Math.min((s.sales / s.target) * 100, 100);
                                    const remaining = s.target - s.sales;
                                    return (
                                        <div key={s.id} className="p-6 rounded-2xl bg-[#0c0c0e] border border-[#27272a] hover:border-slate-700 transition-all">
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                                <div className="w-full md:w-56 text-center md:text-left">
                                                    <p className="font-black text-lg uppercase text-white leading-none mb-1">{s.name}</p>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase italic">Meta: {formatCurrency(s.target)}</p>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4 w-full">
                                                    <div className="space-y-1.5">
                                                        <label className="text-[9px] font-black text-emerald-500/60 uppercase ml-2 italic">Vendas</label>
                                                        <input 
                                                            type="number" 
                                                            value={s.sales}
                                                            onChange={(e) => handleUpdate(s.id, 'sales', e.target.value)}
                                                            className="bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-sm font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 w-full transition-all"
                                                        />
