<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Medsystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050810] text-slate-100 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [sellers, setSellers] = useState([
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0 },
                { id: 2, name: 'Luiz', sales: 0, contracts: 0 },
                { id: 3, name: 'Vanessa', sales: 0, contracts: 0 },
                { id: 4, name: 'João', sales: 0, contracts: 0 }
            ]);

            const handleUpdate = (id, field, amount) => {
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: Math.max(0, s[field] + amount) } : s
                ));
            };

            const rankSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const rankContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, color, field }) => (
                <div className="flex-1 bg-[#111827] p-4 rounded-3xl border border-slate-800 shadow-xl min-w-[300px]">
                    <h3 className="text-center text-[10px] font-black uppercase tracking-widest mb-6 text-slate-400">{title}</h3>
                    <div className="flex items-end justify-center gap-2 h-32">
                        {/* 2º */}
                        <div className="flex flex-col items-center w-1/4 text-center">
                            <span className="text-[9px] font-bold mb-1 truncate w-full opacity-70">{data[1].name}</span>
                            <div className="w-full bg-slate-800 h-12 rounded-t-lg border-t-2 border-slate-600 flex items-center justify-center">
                                <span className="text-[8px]">R${data[1][field]}</span>
                            </div>
                        </div>
                        {/* 1º */}
                        <div className="flex flex-col items-center w-1/4 text-center">
                            <span className="text-[10px] font-black text-yellow-500 mb-1 uppercase truncate w-full">{data[0].name}</span>
                            <div className={`${color} w-full h-20 rounded-t-lg border-t-4 border-white/20 flex flex-col items-center justify-center`}>
                                <span className="text-lg font-black italic">1º</span>
                                <span className="text-[9px] font-bold">R${data[0][field]}</span>
                            </div>
                        </div>
                        {/* 3º */}
                        <div className="flex flex-col items-center w-1/4 text-center">
                            <span className="text-[9px] font-bold mb-1 truncate w-full opacity-50">{data[2].name}</span>
                            <div className="w-full bg-slate-800/40 h-8 rounded-t-lg border-t-2 border-slate-700 flex items-center justify-center text-slate-500">
                                <span className="text-[8px]">R${data[2][field]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto p-4 space-y-6">
                    <header className="text-center py-4">
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter text-white">
                            LIVE <span className="text-emerald-500 text-3xl">RANKING</span>
                        </h1>
                        <p className="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em]">Medsystem Equipe</p>
                    </header>

                    <div className="flex flex-wrap md:flex-nowrap gap-4">
                        <Podium title="💰 Ranking de Vendas" data={rankSales} color="bg-emerald-600" field="sales" />
                        <Podium title="📄 Contratos Aceitos" data={rankContracts} color="bg-blue-600" field="contracts" />
                    </div>

                    <div className="space-y-4">
                        <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-2 text-center md:text-left">Atualizar Dados</h2>
                        {sellers.map(s => (
                            <div key={s.id} className="bg-[#111827] p-4 rounded-2xl border border-slate-800 flex flex-col md:flex-row items-center gap-4">
                                <span className="min-w-[100px] text-white font-black uppercase text-xs">{s.name}</span>
                                <div className="grid grid-cols-2 gap-3 w-full">
                                    <div className="bg-black/40 p-2 rounded-xl border border-slate-800 flex items-center justify-between">
                                        <button onClick={() => handleUpdate(s.id, 'sales', 100)} className="w-7 h-7 bg-emerald-600 rounded-lg font-bold">+</button>
                                        <div className="text-center">
                                            <p className="text-[7px] uppercase font-bold text-slate-500">Vendas</p>
                                            <p className="text-[10px] font-mono font-bold">R
