<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Financeiro TV - Compacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::placeholder { color: #cbd5e1; font-weight: normal; }
        .input-mini { @apply w-full p-1.5 bg-gray-50 border rounded-lg text-center font-bold text-xs outline-none focus:border-indigo-400; }
    </div>
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 italic">

    <div class="max-w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-4">
        
        <div class="bg-white rounded-2xl shadow-md border-t-4 border-emerald-600 p-3 space-y-3">
            <h2 class="text-sm font-black text-center uppercase tracking-widest text-emerald-900">Ecos</h2>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-3">
                    <label class="text-[9px] font-bold uppercase text-gray-400">Faturamento Atual</label>
                    <input type="text" id="ecos-atual" oninput="mascara(this, 'ecos', 'atual')" class="w-full p-2 bg-emerald-50 border-2 border-emerald-100 rounded-xl text-lg font-black text-center text-emerald-700 outline-none" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Mar/25</label>
                    <input type="text" id="ecos-ref2025" oninput="mascara(this, 'ecos', 'ref2025')" class="input-mini" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Pior 26</label>
                    <input type="text" id="ecos-pior2026" oninput="mascara(this, 'ecos', 'pior2026')" class="input-mini" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Melhor 26</label>
                    <input type="text" id="ecos-melhor2026" oninput="mascara(this, 'ecos', 'melhor2026')" class="input-mini" placeholder="R$ 0,00">
                </div>
            </div>

            <div id="res-ecos" class="space-y-1.5"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border-t-4 border-indigo-600 p-3 space-y-3">
            <h2 class="text-sm font-black text-center uppercase tracking-widest text-indigo-900">Medsystem</h2>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-3">
                    <label class="text-[9px] font-bold uppercase text-gray-400">Faturamento Atual</label>
                    <input type="text" id="med-atual" oninput="mascara(this, 'med', 'atual')" class="w-full p-2 bg-indigo-50 border-2 border-indigo-100 rounded-xl text-lg font-black text-center text-indigo-700 outline-none" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Mar/25</label>
                    <input type="text" id="med-ref2025" oninput="mascara(this, 'med', 'ref2025')" class="input-mini" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Pior 26</label>
                    <input type="text" id="med-pior2026" oninput="mascara(this, 'med', 'pior2026')" class="input-mini" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-400 block text-center">Melhor 26</label>
                    <input type="text" id="med-melhor2026" oninput="mascara(this, 'med', 'melhor2026')" class="input-mini" placeholder="R$ 0,00">
                </div>
            </div>

            <div id="res-med" class="space-y-1.5"></div>
        </div>

    </div>

    <script>
        const storeKey = 'dash_tv_compact_v1';
        let dados = JSON.parse(localStorage.getItem(storeKey)) || {
            med: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 },
            ecos: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 }
        };

        function formatar(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function mascara(i, emp, campo) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = v !== '0,00' ? 'R$ ' + v : '';
            
            dados[emp][campo] = parseFloat(v.replace(/\./g, '').replace(',', '.')) || 0;
            localStorage.setItem(storeKey, JSON.stringify(dados));
            calcular(emp);
        }

        function criarCard(titulo, base, atual) {
            if (!base || !atual) return '';
            const diff = atual - base;
            const perc = (atual / base) * 100;
            const corStatus = diff >= 0 ? 'border-green-500 bg-green-50 text-green-700' : 'border-red-500 bg-red-50 text-red-700';
            
            return `
                <div class="px-3 py-2 border-l-4 rounded-lg shadow-sm ${corStatus}">
                    <p class="text-[8px] font-bold uppercase opacity-80">${titulo}: ${formatar(base)}</p>
                    <div class="flex justify-between items-center font-black">
                        <span class="text-[11px]">DIF: ${diff >= 0 ? '+' : ''}${formatar(diff)}</span>
                        <span class="text-[11px]">ATIN: ${perc.toFixed(2)}%</span>
                    </div>
                </div>
            `;
        }

        function calcular(emp) {
            const d = dados[emp];
            let html = "";
            html += criarCard("📈 Março/2025", d.ref2025, d.atual);
            html += criarCard("📉 Pior 2026", d.pior2026, d.atual);
            html += criarCard("🏆 Melhor 2026", d.melhor2026, d.atual);
            document.getElementById(`res-${emp}`).innerHTML = html;
        }

        window.onload = () => {
            ['med', 'ecos'].forEach(emp => {
                ['atual', 'ref2025', 'pior2026', 'melhor2026'].forEach(f => {
                    if(dados[emp][f] > 0) document.getElementById(`${emp}-${f}`).value = formatar(dados[emp][f]);
                });
                calcular(emp);
            });
        };
    </script>
</body>
</html>
