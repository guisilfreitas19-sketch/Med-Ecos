<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Med/Ecos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        input::placeholder { color: #cbd5e1; font-weight: normal; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="bg-white shadow-sm sticky top-0 z-10">
        <div class="flex max-w-md mx-auto">
            <button onclick="mudarAba('med')" id="btn-med" class="flex-1 py-4 text-center font-bold uppercase tracking-wider tab-active">Medsystem</button>
            <button onclick="mudarAba('ecos')" id="btn-ecos" class="flex-1 py-4 text-center font-bold uppercase tracking-wider text-gray-400">Ecos</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-wider">Entrada de Dados - <span id="label-empresa">MEDSYSTEM</span></h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Faturamento Mês Atual</label>
                    <input type="text" id="atual" oninput="aplicarMascara(this, 'atual')" class="w-full mt-1 p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none text-lg font-bold" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Mesmo Mês 2025</label>
                    <input type="text" id="ref2025" oninput="aplicarMascara(this, 'ref2025')" class="w-full mt-1 p-2 bg-gray-50 border rounded-lg outline-none focus:border-indigo-400" placeholder="R$ 0,00">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Pior Mês 2026</label>
                    <input type="text" id="pior2026" oninput="aplicarMascara(this, 'pior2026')" class="w-full mt-1 p-2 bg-gray-50 border rounded-lg outline-none focus:border-indigo-400" placeholder="R$ 0,00">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Melhor Mês 2026 (Recorde)</label>
                    <input type="text" id="melhor2026" oninput="aplicarMascara(this, 'melhor2026')" class="w-full mt-1 p-2 bg-gray-50 border rounded-lg outline-none focus:border-indigo-400" placeholder="R$ 0,00">
                </div>
            </div>
        </div>

        <div class="space-y-3 text-center">
            <div id="card2025" class="bg-white p-4 rounded-xl border-l-4 border-gray-200 shadow-sm transition-all">
                <p class="text-[10px] font-black text-gray-400 uppercase leading-none mb-1">Comparativo Anual (2025)</p>
                <p id="txt2025" class="text-lg font-bold text-gray-300 italic">Insira os valores</p>
            </div>

            <div id="cardPior" class="bg-white p-4 rounded-xl border-l-4 border-gray-200 shadow-sm transition-all">
                <p class="text-[10px] font-black text-gray-400 uppercase leading-none mb-1">Evolução sobre o Pior Mês</p>
                <p id="txtPior" class="text-lg font-bold text-gray-300 italic">Aguardando...</p>
            </div>

            <div class="bg-slate-900 p-5 rounded-2xl text-white shadow-lg relative overflow-hidden">
                <p class="text-[10px] font-black text-indigo-300 uppercase">Meta de Recorde</p>
                <h2 id="txtMelhor" class="text-2xl font-black mt-1 text-yellow-4
