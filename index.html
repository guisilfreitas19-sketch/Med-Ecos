<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f8fafc; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const formatCurrency = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        function App() {
            // Estado inicial limpo para evitar erros de versão
            const [sellers, setSellers] = useState(() => {
                const saved = localStorage.getItem('soitic_v_back');
                return saved ? JSON.parse(saved).sellers : [
                    { id: 1, name: 'Guilherme', sales: 0, contracts: 0, company: 'MEDSYSTEM' },
                    { id: 2, name: 'Vanessa', sales: 0, contracts: 0, company: 'ECOS' },
                    { id: 3, name: 'Luiz', sales: 0, contracts: 0, company: 'MEDSYSTEM' },
                    { id: 4, name: 'João', sales: 0, contracts: 0, company: 'ECOS' }
                ];
            });

            const [companies, setCompanies] = useState(() => {
                const saved = localStorage.getItem('soitic_v_back');
                return saved ? JSON.parse(saved).companies : [
                    { id: 'med', name: 'MEDSYSTEM', best: 0, worst: 0, lastYear: 0 },
                    { id: 'ecos', name: 'ECOS', best: 0, worst: 0, lastYear: 0 }
                ];
            });

            useEffect(() => {
                localStorage.setItem('soitic_v_back', JSON.stringify({ sellers, companies }));
            }, [sellers, companies]);

            // Cálculo das Somas Automáticas
            const groupTotals = useMemo(() => {
                return sellers.reduce((acc, s) => {
                    if (!acc[s.company]) acc[s.company] = { sales: 0, contracts: 0 };
                    acc[s.company].sales += s.sales;
                    acc[s.company].contracts += s.contracts;
                    return acc;
                }, {});
            }, [sellers]);

            const updateSeller = (id, field, val) => {
                const num = parseFloat(val) || 0;
                setSellers(prev => prev.map(s => s.id === id ? { ...s, [field]: num } : s));
            };

            const updateCompany = (id, field, val) => {
                const num = parseFloat(val) || 0;
                setCompanies(prev => prev.map(c => c.id === id ? { ...c, [field]: num } : c));
            };

            return (
                <div className="max-w-4xl mx-auto p-6 space-y-8">
                    <header className="py-6 border-b border-zinc-800 flex justify-between items-center">
                        <h1 className="text-2xl font-black uppercase italic">Grupo <span className="text-amber-500">Soitic</span></h1>
                        <button onClick={() => {localStorage.clear(); location.reload();}} className="text-[10px] text-zinc-600 hover:text-red-500">Limpar Dados</button>
                    </header>

                    {/* SEÇÃO VENDEDORES */}
                    <div className="grid gap-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-zinc-500">Lançamentos Individuais</h3>
                        {sellers.map(s => (
                            <div key={s.id} className="bg-card p-4 rounded-xl grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                                <div>
                                    <p className="font-bold">{s.name}</p>
                                    <p className="text-[10px] text-amber-500 font-bold uppercase">{s.company}</p>
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[9px] text-zinc-500 uppercase">Vendas (R$)</span>
                                    <input type="number" value={s.sales} onChange={e => updateSeller(s.id, 'sales', e.target.value)} className="bg-zinc-900 w-full p-2 rounded border border-zinc-800 text-emerald-500 font-mono" />
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[9px] text-zinc-500 uppercase">Aceites (Qtd)</span>
                                    <input type="number" value={s.contracts} onChange={e => updateSeller(s.id, 'contracts', e.target.value)} className="bg-zinc-900 w-full p-2 rounded border border-zinc-800 text-blue-500 font-mono" />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* SEÇÃO EMPRESAS COM SOMA AUTOMÁTICA */}
                    <div className="grid md:grid-cols-2 gap-6 pt-6 border-t border-zinc-800">
                        {companies.map(c => (
                            <div key={c.id} className="bg-card p-6 rounded-2xl border-t-4 border-amber-600">
                                <h4 className="font-black text-lg mb-4">{c.name}</h4>
                                
                                {/* DISPLAY DAS SOMAS AUTOMÁTICAS */}
                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    <div className="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                                        <p className="text-[8px] text-zinc-500 uppercase font-bold">Total Vendas</p>
                                        <p className="text-sm font-mono text-emerald-500 font-bold">{formatCurrency(groupTotals[c.name]?.sales)}</p>
                                    </div>
                                    <div className="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                                        <p className="text-[8px] text-zinc-500 uppercase font-bold">Total Aceites</p>
                                        <p className="text-sm font-mono text-blue-500 font-bold">{groupTotals[c.name]?.contracts || 0} CT</p>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center">
                                        <label className="text-[10px] uppercase text-zinc-400">Melhor Mês 2026</label>
                                        <input type="number" value={c.best} onChange={e => updateCompany(c.id, 'best', e.target.value)} className="bg-transparent border-b border-zinc-800 text-right font-mono text-xs w-24 outline-none focus:border-amber-500" />
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <label className="text-[10px] uppercase text-zinc-400">Pior Mês 2026</label>
                                        <input type="number" value={c.worst} onChange={e => updateCompany(c.id, 'worst', e.target.value)} className="bg-transparent border-b border-zinc-800 text-right font-mono text-xs w-24 outline-none focus:border-red-500" />
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <label className="text-[10px] uppercase text-zinc-400">Mesmo Mês 2025</label>
                                        <input type="number" value={c.lastYear} onChange={e => updateCompany(c.id, 'lastYear', e.target.value)} className="bg-transparent border-b border-zinc-800 text-right font-mono text-xs w-24 outline-none focus:border-zinc-500" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
