<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { background-color: #09090b; color: white; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            // Versão simplificada para teste de carga
            const [sellers, setSellers] = useState([
                { id: 1, name: 'Guilherme', sales: 0, company: 'MEDSYSTEM' },
                { id: 2, name: 'Vanessa', sales: 0, company: 'ECOS' },
                { id: 3, name: 'Luiz', sales: 0, company: 'MEDSYSTEM' },
                { id: 4, name: 'João', sales: 0, company: 'ECOS' }
            ]);

            return (
                <div className="p-10">
                    <h1 className="text-2xl font-bold mb-4">Teste de Conexão - Grupo Soitic</h1>
                    <div className="space-y-4">
                        {sellers.map(s => (
                            <div key={s.id} className="p-4 bg-zinc-900 border border-zinc-800 rounded-xl">
                                {s.name} - {s.company}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
