</head>
<body class="pb-20">
    <div id="root"></div>

        );

        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            }).format(value);
        };

        function App() {
            const initialState = JSON.parse(localStorage.getItem('soitic_manual_v1')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ];

            const [sellers, setSellers] = useState(initialState);

            useEffect(() => {
                localStorage.setItem('soitic_manual_v1', JSON.stringify(sellers));
            }, [sellers]);

            const handleUpdate = (id, field, value) => {
                const val = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => {
                    if (s.id === id) {
                        if (field === 'sales' && val >= s.target && s.sales < s.target) {
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#10b981', '#ffffff'] });
                        }
                        return { ...s, [field]: val };
                    }
                    return s;
                }));
            };

            const resetAll = () => {
                if(confirm("Zerar todos os dados do ranking?")) {
                    setSellers(sellers.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const sortedSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const sortedContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);
